<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudHost</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">

            <div class="logo">
                CloudHost
            </div>

            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#">Pricing</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

            <button class="btn">
                Get Started
            </button>

        </nav>
    </header>

    <section class="hero">

    <div class="hero-content">

        <span class="tag">
            ☁️ Trusted by 10,000+ Developers
        </span>

        <h1>
            Deploy Your Website <br>
            <span>In Seconds.</span>
        </h1>

        <p>
            Build, deploy, and scale your web applications with lightning-fast cloud hosting. Simple, secure, and reliable.
        </p>

        <div class="hero-btns">
            <button class="primary-btn">Start Free</button>
            <button class="secondary-btn">View Pricing</button>
        </div>

    </div>

    <div class="hero-image">

        <div class="server-card">
            <h3>Cloud Server</h3>
            <p>⚡ 99.99% Uptime</p>
            <p>🌍 Global CDN</p>
            <p>🔒 Free SSL</p>
        </div>

    </div>

</section>
<script src="script.js"></script>

</body>

</html>
